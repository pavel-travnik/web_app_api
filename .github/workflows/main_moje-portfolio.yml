name: Deploy Python app to Azure Web App - moje-portfolio

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Zip artifact
        run: zip -r release.zip .

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_CC7FE67C540447ED92B277F29D80C127 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_0609AE0CDB5947D18CBAAF0CD6329E9A }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_34E258A51C414D8F90C9E9EB2FB8191F }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: "moje-portfolio"
          package: "release.zip"
